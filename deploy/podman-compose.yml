version: "3.8"

services:
  postgres:
    image: docker.io/library/postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp}
      POSTGRES_DB: ${POSTGRES_DB:-mcp_gateway}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcp} -d ${POSTGRES_DB:-mcp_gateway}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mcp_gateway}
      KC_DB_USERNAME: ${POSTGRES_USER:-mcp}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-mcp}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "18080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/tcp/localhost/8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ..
      dockerfile: deploy/Containerfile.backend
    env_file: .env
    ports:
      - "18000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ..
      dockerfile: deploy/Containerfile.frontend
    env_file: .env
    ports:
      - "13000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
